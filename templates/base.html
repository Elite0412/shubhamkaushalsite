<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Shubham Kaushal Tuition{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  <script defer src="{{ url_for('static', filename='script.js') }}"></script>
</head>
<body>
<header class="site-header">
  <div class="container nav-row">
    <h1>Shubham Kaushal Tuition</h1>
    <nav>
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('contact') }}">Contact</a>
      <a href="{{ url_for('notes') }}">Notes</a>
      <a href="{{ url_for('admin_login') }}">Admin Panel</a>
    </nav>
  </div>
</header>

<main class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="alerts">
        {% for category, message in messages %}
          <p class="alert {{ category }}">{{ message }}</p>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>

<footer class="site-footer">
  <div class="container">© 2026 Shubham Kaushal Tuition</div>
</footer>
</body>
</html>
