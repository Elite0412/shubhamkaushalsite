{% extends "base.html" %}
{% block title %}Edit Note{% endblock %}
{% block content %}
<section class="card">
  <h2>Edit Note</h2>
  <form method="post" class="stack">
    <label>Title</label>
    <input name="title" value="{{ note.title }}" required />
    <label>Description</label>
    <textarea name="description" rows="5" required>{{ note.description }}</textarea>
    <div>
      <button class="btn" type="submit">Save</button>
      <a class="btn alt" href="{{ url_for('admin_panel') }}">Back</a>
    </div>
  </form>
</section>
{% endblock %}
