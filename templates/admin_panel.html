{% extends "base.html" %}
{% block title %}Admin Panel{% endblock %}
{% block content %}
<section class="card">
  <div class="row-between">
    <h2>Admin Panel</h2>
    <form method="post" action="{{ url_for('admin_logout') }}">
      <button class="btn alt" type="submit">Logout</button>
    </form>
  </div>

  <form method="post" class="stack">
    <label>Title</label>
    <input name="title" required />
    <label>Description</label>
    <textarea name="description" rows="4" required></textarea>
    <button class="btn" type="submit">Publish Note</button>
  </form>
</section>

<section class="card">
  <h3>Edit / Delete Notes</h3>
  {% if notes %}
    <table>
      <thead><tr><th>ID</th><th>Title</th><th>Actions</th></tr></thead>
      <tbody>
        {% for note in notes %}
          <tr>
            <td>{{ note.id }}</td>
            <td>{{ note.title }}</td>
            <td>
              <a class="btn mini" href="{{ url_for('edit_note', note_id=note.id) }}">Edit</a>
              <form method="post" class="inline" action="{{ url_for('delete_note', note_id=note.id) }}">
                <button class="btn mini danger" type="submit">Delete</button>
              </form>
            </td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  {% else %}
    <p>No notes available.</p>
  {% endif %}
</section>
{% endblock %}
