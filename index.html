<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Intro</title>
<style>
    body {
        margin: 0;
        background: black;
        color: white;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    #formula {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 2.5rem;
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    #formula.show {
        opacity: 1;
    }

    #swipe {
        position: fixed;
        bottom: -100%;
        width: 100%;
        height: 100%;
        background: black;
        transition: bottom 0.8s ease;
        z-index: 10;
    }

    #swipe.active {
        bottom: 0;
    }
</style>
</head>
<body>

<div id="formula"></div>
<div id="swipe"></div>

<script>
    const formulas = [
        "E = mc²",
        "F = ma",
        "V = IR",
        "p = mv",
        "W = Fd",
        "a² + b² = c²",
        "λ = v/f",
        "ΔE = hf"
    ];

    const el = document.getElementById('formula');
    const delay = 400;

    formulas.forEach((formula, index) => {
        setTimeout(() => {
            el.classList.remove('show');

            setTimeout(() => {
                el.textContent = formula;
                el.classList.add('show');
            }, 100);

        }, index * delay);
    });

    const totalTime = formulas.length * delay + 500;

    setTimeout(() => {
        document.getElementById('swipe').classList.add('active');
    }, totalTime);

    setTimeout(() => {
        window.location.href = "https://kaushalphysics.vercel.app/";
    }, totalTime + 800);
</script>

</body>
</html>
